<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelime Pratiği — Almanca Pasaportu</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header" id="site-header"></header>

<main>
  <div class="page-head">
    <span class="eyebrow">Kelime Pratiği</span>
    <h1>Almancasını gör, Türkçesini yaz</h1>
    <p class="lead">Kelimenin Türkçe karşılığını kutuya yazıp Enter'a basın veya "Kontrol Et"e tıklayın. Küçük yazım farkları (parantez içi açıklamalar hariç) kabul edilir.</p>
  </div>

  <div class="level-tabs">
    <button data-level="a1">A1</button>
    <button data-level="a2">A2</button>
  </div>

  <div class="study-toolbar">
    <label>
      <input type="checkbox" id="studied-only-toggle">
      Sadece "Kelime Çalış"tan işaretlediklerim <span id="studied-only-count" style="font-family:'IBM Plex Mono',monospace;"></span>
    </label>
  </div>

  <div class="vocab-stage">
    <div class="vocab-counter" id="vocab-counter"></div>
    <div class="vocab-card">
      <div class="vocab-category" id="vocab-category"></div>
      <div class="vocab-word" id="vocab-word"></div>
      <div class="vocab-input-row">
        <input type="text" id="vocab-input" placeholder="Türkçe karşılığını yaz..." autocomplete="off">
      </div>
      <div class="feedback" id="vocab-feedback"></div>
      <div class="btn-row">
        <button class="btn" id="check-btn">Kontrol Et</button>
        <button class="btn secondary" id="next-btn" style="display:none;">Sonraki Kelime →</button>
      </div>
    </div>
    <div class="vocab-score-strip" id="vocab-score"></div>
  </div>
</main>

<footer id="site-footer"></footer>

<script src="js/app.js"></script>
<script src="js/vocab.js"></script>
</body>
</html>
